name: crm

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: crm
      POSTGRES_USER: crm
      POSTGRES_PASSWORD: crm
    ports:
      - "5433:5432"
    volumes:
      - crm-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm -d crm"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio12345
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - crm-miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio12345
      MINIO_BUCKET: crm-files
    entrypoint: >
      /bin/sh -c "
      mc alias set local \"$$MINIO_ENDPOINT\" \"$$MINIO_ROOT_USER\" \"$$MINIO_ROOT_PASSWORD\" &&
      mc mb --ignore-existing \"local/$$MINIO_BUCKET\" &&
      echo \"bucket $$MINIO_BUCKET ready\"
      "

  api:
    build:
      context: ./app/api
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    env_file:
      - ./app/api/.env
    environment:
      DATABASE_URL: postgres://crm:crm@postgres:5432/crm
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minio
      MINIO_SECRET_KEY: minio12345
      MINIO_BUCKET: crm-files
      MINIO_REGION: us-east-1
      MINIO_USE_SSL: "false"
    ports:
      - "3000:3000"
    volumes:
      - ./app/api:/app
      - /app/node_modules

  ui:
    build:
      context: ./app/ui
    depends_on:
      - api
    env_file:
      - ./app/ui/.env
    environment:
      CHOKIDAR_USEPOLLING: "true"
      VITE_API_URL: http://api:3000
    ports:
      - "5174:5174"
      - "4101:4101"
    volumes:
      - ./app/ui:/app
      - ui_node_modules:/app/node_modules

volumes:
  crm-pgdata:
  crm-miniodata:
  ui_node_modules:
