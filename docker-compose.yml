name: crm

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: crm
      POSTGRES_USER: crm
      POSTGRES_PASSWORD: crm
    ports:
      - "5433:5432"
    volumes:
      - crm-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm -d crm"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./app/api
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./app/api/.env
    environment:
      DATABASE_URL: postgres://crm:crm@postgres:5432/crm
    ports:
      - "3000:3000"
    volumes:
      - ./app/api:/app
      - /app/node_modules

  ui:
    build:
      context: ./app/ui
    depends_on:
      - api
    env_file:
      - ./app/ui/.env
    environment:
      CHOKIDAR_USEPOLLING: "true"
      VITE_API_URL: http://api:3000
    ports:
      - "5174:5174"
      - "4101:4101"
    volumes:
      - ./app/ui:/app
      - ui_node_modules:/app/node_modules

volumes:
  crm-pgdata:
  ui_node_modules:
